apiVersion: apps/v1
kind: Deployment
metadata:
    name: backend
    namespace: flashcards-app
spec:
    replicas: 1
    selector:
        matchLabels:
            app: backend
    template:
        metadata:
            labels:
                app: backend
        spec:
            containers:
                - name: backend
                  image: flashcards-backend:latest
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 8080
                  env:
                      - name: PORT
                        valueFrom:
                            configMapKeyRef:
                                name: flashcards-app-config
                                key: PORT
                      - name: CORS_ORIGIN
                        valueFrom:
                            configMapKeyRef:
                                name: flashcards-app-config
                                key: CORS_ORIGIN
                      - name: DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: DATABASE_URL
                      - name: JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: JWT_SECRET
                      - name: JWT_EXPIRES_IN
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: JWT_EXPIRES_IN
                      - name: JWT_REFRESH_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: JWT_REFRESH_SECRET
                      - name: JWT_REFRESH_EXPIRES_IN
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: JWT_REFRESH_EXPIRES_IN
                      - name: RABBITMQ_URL
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: RABBITMQ_URL
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 8080
                      initialDelaySeconds: 15
                      periodSeconds: 20
                  resources:
                      requests:
                          cpu: '100m'
                          memory: '128Mi'
                      limits:
                          cpu: '300m'
                          memory: '256Mi'
