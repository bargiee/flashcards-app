apiVersion: batch/v1
kind: Job
metadata:
    name: prisma-migrate
    namespace: flashcards-app
spec:
    backoffLimit: 3
    template:
        spec:
            restartPolicy: Never
            containers:
                - name: prisma-migrate
                  image: flashcards-backend:latest
                  imagePullPolicy: IfNotPresent
                  command: ['npx', 'prisma', 'migrate', 'deploy']
                  env:
                      - name: DATABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: flashcards-app-secret
                                key: DATABASE_URL
